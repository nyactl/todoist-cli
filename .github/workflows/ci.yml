name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: coverage gate
        run: |
          go test ./internal/db/... ./internal/state/... ./internal/tasks/... \
            -coverprofile=coverage.out -covermode=atomic
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${total}% (minimum: 70%)"
          if [ "$(echo "${total} < 70" | bc)" = "1" ]; then
            echo "FAIL: coverage below 70%"
            exit 1
          fi
